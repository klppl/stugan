# stugan example configuration.
# Copy to $STUGAN_HOME/config.toml (default: ~/.config/stugan/config.toml).
# All fields are optional; shown values are the defaults unless noted.

[server]
listen = "127.0.0.1:8080"
# public_url = "https://irc.example.com"   # for absolute links / push
# trusted_proxies = ["127.0.0.1/32", "::1/128"]   # reverse proxies in front
#   of the daemon. When set, the real client IP for auth rate-limiting is read
#   from CF-Connecting-IP / X-Forwarded-For for requests from these peers.
#   For a Cloudflare Tunnel (cloudflared → localhost) this is exactly
#   ["127.0.0.1/32", "::1/128"]. Leave empty when the daemon is directly
#   exposed — forwarded headers are then ignored (unspoofable).

[log]
level  = "info"   # debug | info | warn | error
format = "text"   # text | json

[history]
# retention_days = 90   # prune messages older than N days (0 = keep forever)

[plugins]
enabled = true
# sandbox = true   # default. Restricts the Lua stdlib (no os.execute/io/etc).
#   Multi-user is always sandboxed. Single-user may set false to opt into the
#   full stdlib for trusted local scripts. See docs/plugins.md.

# Per-plugin settings, keyed by script basename. Read via stugan.config(...).
[plugins.settings.highlight_reply]
word = "ping"

# --- Single-user (default) ---------------------------------------------------
# With no [[users]] blocks the daemon runs single-user and unauthenticated,
# owning the top-level [[networks]] below.
#
# --- Multi-user --------------------------------------------------------------
# Add [[users]] blocks to require login. Each user owns their own networks and
# is fully isolated (separate connections, history, plugins). Generate a
# password hash with:  stugan -hashpw   (reads the password from stdin)
#
# [auth]
# session_hours = 720   # session lifetime (default 30 days)
#
# [[users]]
# name = "alice"
# password_hash = "$2a$10$....."   # from `stugan -hashpw`
#   [[users.networks]]
#   name = "libera"
#   addr = "irc.libera.chat:6697"
#   tls  = true
#   nick = "alice"
#   channels = ["#stugan"]

# Networks can be added, removed, and connected entirely from the web UI
# (the "+ Add network" button). Any [[networks]] below are used only to SEED
# the store on first run; after that the store is authoritative, so manage
# networks from the GUI rather than editing this file.
#
# One [[networks]] block per IRC network (single-user mode).
[[networks]]
name     = "libera"
addr     = "irc.libera.chat:6697"
# fallbacks = ["irc.eu.libera.chat:6697"]  # tried in order if addr won't connect
tls      = true
# insecure = true                 # skip TLS cert verification (self-signed / LAN only)
nick     = "stuganuser"
user     = "stuganuser"
realname = "stugan"
channels = ["#stugan"]
# monitor = ["friend1", "friend2"]   # IRCv3 MONITOR friends list (online/offline)
connect  = true
# sasl_user = "account"           # SASL PLAIN account…
# sasl_pass = "secret"            # …and its password
#
# server_pass = "hunter2"         # IRC PASS — for bouncers (ZNC/soju) or
#                                 # password-gated servers
#
# perform = [                     # commands run after registration, on every
#   "/msg NickServ IDENTIFY hunter2",   # (re)connect — identify, set modes,
#   "/mode $me +B",                    # variables: $me/$nick, $network,
#                                         # $server, $user, and $realname
#   "/join #private secretkey",         # join keyed channels, etc.
# ]
#
# CertFP / SASL EXTERNAL: present a client certificate and authenticate with
# it instead of a password. cert_file is a PEM with the certificate and the
# private key concatenated.
# sasl_external = true
# cert_file     = "/home/me/.config/stugan/libera.pem"

# ---------------------------------------------------------------------------
# SSH terminal UI (optional). Serves the same client over SSH as a full-screen
# terminal app, bridged to the same engine as the web UI. Public-key auth only.
# See docs/ssh.md.
# ---------------------------------------------------------------------------
# [ssh]
# enabled = true
# listen  = "0.0.0.0:2222"                     # default ":2222"
# host_key = ""                                # default <data>/ssh_host_ed25519_key (auto-generated)
# authorized_keys = [                          # single-user mode; multi-user uses
#   "ssh-ed25519 AAAA... me@laptop",           # each [[users]].authorized_keys
# ]
#
# Connect with:  ssh -p 2222 default@your-host
