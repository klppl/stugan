# stugan example configuration.
# Copy to $STUGAN_HOME/config.toml (default: ~/.config/stugan/config.toml).
# All fields are optional; shown values are the defaults unless noted.

[server]
listen = "127.0.0.1:8080"
# public_url = "https://irc.example.com"   # for absolute links / push

[log]
level  = "info"   # debug | info | warn | error
format = "text"   # text | json

[plugins]
enabled = true
sandbox = false   # single-user: full Lua stdlib (logged). See docs/plugins.md.

# Per-plugin settings, keyed by script basename. Read via stugan.config(...).
[plugins.settings.highlight_reply]
word = "ping"

# --- Single-user (default) ---------------------------------------------------
# With no [[users]] blocks the daemon runs single-user and unauthenticated,
# owning the top-level [[networks]] below.
#
# --- Multi-user --------------------------------------------------------------
# Add [[users]] blocks to require login. Each user owns their own networks and
# is fully isolated (separate connections, history, plugins). Generate a
# password hash with:  stugan -hashpw   (reads the password from stdin)
#
# [auth]
# session_hours = 720   # session lifetime (default 30 days)
#
# [[users]]
# name = "alice"
# password_hash = "$2a$10$....."   # from `stugan -hashpw`
#   [[users.networks]]
#   name = "libera"
#   addr = "irc.libera.chat:6697"
#   tls  = true
#   nick = "alice"
#   channels = ["#stugan"]

# One [[networks]] block per IRC network (single-user mode).
[[networks]]
name     = "libera"
addr     = "irc.libera.chat:6697"
tls      = true
nick     = "stuganuser"
user     = "stuganuser"
realname = "stugan"
channels = ["#stugan"]
connect  = true
# sasl_user = "account"
# sasl_pass = "secret"
